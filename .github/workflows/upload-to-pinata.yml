name: Deploy Full Project to Pinata

on:
  push:
    branches:
      - main  # Adjust if your branch is different

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # Ensure correct Node version for your project

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Zip all root files and folders
        run: |
          mkdir build-zip
          cp -r .next build-zip/
          cp -r app build-zip/
          cp -r public build-zip/
          cp package.json build-zip/
          cp package-lock.json build-zip/
          cp README.md build-zip/
          cd build-zip
          zip -r ../build.zip .  # Zip all contents of build-zip

      - name: Upload to Pinata
        run: node scripts/upload.js
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_API_SECRET: ${{ secrets.PINATA_API_SECRET }}